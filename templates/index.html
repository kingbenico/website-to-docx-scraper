<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site to DOCX</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      color: #111;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 1.8rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.4rem;
    }

    input[type="url"] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="url"]:focus {
      border-color: #4f46e5;
    }

    button[type="submit"] {
      margin-top: 1rem;
      width: 100%;
      padding: 0.75rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    button[type="submit"]:hover:not(:disabled) {
      background: #4338ca;
    }

    button[type="submit"]:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #status-area {
      margin-top: 1.5rem;
      display: none;
    }

    .status-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.4rem;
    }

    #log-box {
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: "Fira Code", "Courier New", monospace;
      font-size: 0.78rem;
      border-radius: 8px;
      padding: 1rem;
      height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #download-area {
      margin-top: 1.2rem;
      display: none;
    }

    .download-btn {
      display: inline-block;
      padding: 0.65rem 1.4rem;
      background: #16a34a;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    .download-btn:hover {
      background: #15803d;
    }

    #error-area {
      margin-top: 1rem;
      display: none;
      padding: 0.75rem 1rem;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: #b91c1c;
      font-size: 0.88rem;
    }

    .stop-btn {
      margin-top: 0.75rem;
      width: 100%;
      padding: 0.65rem;
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      display: none;
    }

    .stop-btn:hover {
      background: #b91c1c;
    }

    .note {
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: #999;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/static/Blue-Crocus-Logo.png" alt="Blue Crocus Solutions" style="height: 40px; margin-bottom: 1.2rem;" />
    <h1>Site to DOCX</h1>
    <p class="subtitle">Enter a website URL to scrape all pages and download a .docx file.</p>

    <form id="scrape-form">
      <label for="url-input">Website URL</label>
      <input
        type="url"
        id="url-input"
        name="url"
        placeholder="https://example.com/"
        required
      />
      <button type="submit" id="submit-btn">
        <span class="spinner" id="spinner"></span>
        <span id="btn-label">Start Scraping</span>
      </button>
      <button type="button" class="stop-btn" id="stop-btn">Stop</button>
    </form>

    <div id="error-area"></div>

    <div id="status-area">
      <div class="status-label">Progress</div>
      <pre id="log-box"></pre>
    </div>

    <div id="download-area">
      <a id="download-link" class="download-btn" href="#">Download .docx</a>
    </div>

    <p class="note">
      Keep this tab open while the scrape runs. Large sites may take 10–30 minutes.
    </p>
  </div>

  <script>
    const form = document.getElementById('scrape-form');
    const submitBtn = document.getElementById('submit-btn');
    const stopBtn = document.getElementById('stop-btn');
    const spinner = document.getElementById('spinner');
    const btnLabel = document.getElementById('btn-label');
    const statusArea = document.getElementById('status-area');
    const logBox = document.getElementById('log-box');
    const downloadArea = document.getElementById('download-area');
    const downloadLink = document.getElementById('download-link');
    const errorArea = document.getElementById('error-area');

    let pollInterval = null;
    let lastLogCount = 0;

    function setLoading(loading) {
      submitBtn.disabled = loading;
      spinner.style.display = loading ? 'block' : 'none';
      btnLabel.textContent = loading ? 'Scraping...' : 'Start Scraping';
      stopBtn.style.display = loading ? 'block' : 'none';
    }

    stopBtn.addEventListener('click', function() {
      clearInterval(pollInterval);
      fetch('/stop', { method: 'POST' }).catch(() => {});
    });

    function showError(msg) {
      errorArea.textContent = msg;
      errorArea.style.display = 'block';
    }

    function appendLog(lines) {
      if (lines.length > lastLogCount) {
        const newLines = lines.slice(lastLogCount);
        logBox.textContent += newLines.join('\n') + (newLines.length ? '\n' : '');
        lastLogCount = lines.length;
        logBox.scrollTop = logBox.scrollHeight;
      }
    }

    function poll(jobId) {
      fetch(`/status/${jobId}`)
        .then(r => r.json())
        .then(data => {
          if (data.log) appendLog(data.log);

          if (data.status === 'done') {
            clearInterval(pollInterval);
            setLoading(false);
            downloadLink.href = data.download_url;
            downloadArea.style.display = 'block';
          } else if (data.status === 'error') {
            clearInterval(pollInterval);
            setLoading(false);
            showError('Error: ' + (data.error || 'Unknown error'));
          }
        })
        .catch(() => {
          // Network hiccup — keep polling
        });
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      // Reset state
      errorArea.style.display = 'none';
      errorArea.textContent = '';
      downloadArea.style.display = 'none';
      statusArea.style.display = 'none';
      logBox.textContent = '';
      lastLogCount = 0;

      const formData = new FormData(form);
      setLoading(true);

      fetch('/start', { method: 'POST', body: formData })
        .then(r => r.json())
        .then(data => {
          if (data.error) {
            setLoading(false);
            showError(data.error);
            return;
          }

          statusArea.style.display = 'block';
          const jobId = data.job_id;
          pollInterval = setInterval(() => poll(jobId), 3000);
          poll(jobId); // immediate first poll
        })
        .catch(err => {
          setLoading(false);
          showError('Failed to start job: ' + err.message);
        });
    });
  </script>
</body>
</html>
